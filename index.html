<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VoidArcade — Unblocked Games</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    :root {
      --bg:        #07070F;
      --s1:        #0E0E1C;
      --s2:        #161628;
      --s3:        #1E1E36;
      --border:    rgba(255,255,255,0.07);
      --border-hi: rgba(255,255,255,0.14);
      --accent:    #FF4D6D;
      --t1: #EEEEFF; --t2: #8888AA; --t3: #44445A;
    }

    body { background:var(--bg); color:var(--t1); font-family:'Inter',system-ui,sans-serif; min-height:100vh; overflow-x:hidden; -webkit-font-smoothing:antialiased; }

    /* header */
    .header { position:sticky; top:0; z-index:100; height:62px; background:rgba(7,7,15,.88); backdrop-filter:blur(16px); border-bottom:1px solid var(--border); }
    .header-inner { max-width:1280px; margin:0 auto; padding:0 24px; height:100%; display:flex; align-items:center; gap:16px; }
    .logo { font-family:'Orbitron',sans-serif; font-size:1.1rem; font-weight:900; text-decoration:none; color:var(--t1); letter-spacing:.06em; flex-shrink:0; animation:glitch 10s infinite; }
    .logo span { color:var(--accent); }
    @keyframes glitch {
      0%,92%,100%{text-shadow:none;filter:none}
      93%{text-shadow:-2px 0 #9B5DE5,2px 0 var(--accent);filter:hue-rotate(10deg)}
      94%{text-shadow:2px 0 #9B5DE5,-2px 0 var(--accent)}
      95%{text-shadow:none;filter:none}
      96%{text-shadow:-1px 0 var(--accent)}
      97%{text-shadow:none}
    }
    .search-wrap { position:relative; flex:1; max-width:460px; }
    .search-icon { position:absolute; left:11px; top:50%; transform:translateY(-50%); width:15px; height:15px; color:var(--t3); pointer-events:none; }
    #searchInput { width:100%; padding:9px 34px 9px 36px; background:var(--s2); border:1px solid var(--border); border-radius:8px; color:var(--t1); font-size:.875rem; font-family:inherit; outline:none; transition:border-color .18s; }
    #searchInput:focus { border-color:var(--accent); }
    #searchInput::placeholder { color:var(--t3); }
    .search-clear { position:absolute; right:9px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--t3); font-size:.7rem; cursor:pointer; padding:4px; display:none; }
    .search-clear.visible { display:block; }
    .fav-btn { display:flex; align-items:center; gap:6px; padding:7px 14px; background:var(--s2); border:1px solid var(--border); border-radius:8px; color:var(--t2); font-size:.8rem; font-weight:600; font-family:inherit; cursor:pointer; flex-shrink:0; white-space:nowrap; transition:border-color .18s,color .18s; }
    .fav-btn:hover,.fav-btn.active { border-color:var(--accent); color:var(--accent); }
    .fav-btn.active svg { fill:var(--accent); stroke:var(--accent); }
    .fav-count { background:var(--accent); color:#fff; font-size:.65rem; font-weight:700; min-width:18px; height:18px; border-radius:999px; display:flex; align-items:center; justify-content:center; padding:0 4px; margin-left:2px; }

    /* hero */
    .hero { position:relative; padding:72px 24px 60px; text-align:center; overflow:hidden; border-bottom:1px solid var(--border); background:radial-gradient(ellipse 70% 90% at 50% 110%,rgba(155,93,229,.13) 0%,transparent 65%),radial-gradient(ellipse 40% 55% at 85% -10%,rgba(255,77,109,.09) 0%,transparent 70%); }
    .hero-grid { position:absolute; inset:0; pointer-events:none; background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px); background-size:48px 48px; -webkit-mask-image:radial-gradient(ellipse 80% 80% at 50% 100%,black 0%,transparent 70%); mask-image:radial-gradient(ellipse 80% 80% at 50% 100%,black 0%,transparent 70%); }
    .hero-inner { position:relative; z-index:1; max-width:600px; margin:0 auto; }
    .hero-eyebrow { font-size:.72rem; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--accent); margin-bottom:18px; }
    .hero-title { font-family:'Orbitron',sans-serif; font-size:clamp(2rem,6vw,3.8rem); font-weight:900; line-height:1.08; background:linear-gradient(160deg,#fff 0%,#AAAAC0 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:16px; }
    .hero-sub { font-size:1rem; color:var(--t2); line-height:1.65; }

    /* browse */
    .browse { padding:32px 0 96px; }
    .browse-inner { max-width:1280px; margin:0 auto; padding:0 24px; }
    .filters { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:20px; }
    .pill { padding:6px 15px; border-radius:999px; border:1px solid var(--border); background:var(--s2); color:var(--t2); font-size:.78rem; font-weight:600; font-family:inherit; cursor:pointer; text-transform:capitalize; line-height:1; transition:background .15s,border-color .15s,color .15s,transform .1s; }
    .pill:hover { border-color:var(--border-hi); color:var(--t1); transform:translateY(-1px); }
    .pill.active { background:var(--accent); border-color:var(--accent); color:#fff; }
    .stats { font-size:.78rem; color:var(--t3); margin-bottom:20px; font-weight:500; }

    /* cards */
    .game-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:14px; }
    .game-card { background:var(--s1); border:1px solid var(--border); border-radius:12px; overflow:hidden; cursor:pointer; display:flex; flex-direction:column; transition:transform .2s,border-color .2s,box-shadow .2s; --cc:var(--accent); }
    .game-card:hover { transform:translateY(-5px); border-color:var(--cc); box-shadow:0 12px 40px rgba(0,0,0,.5),0 0 0 1px var(--cc),0 0 24px -4px var(--cc); }
    .game-card:focus-visible { outline:2px solid var(--cc); outline-offset:2px; }
    .card-thumb { aspect-ratio:16/9; display:flex; align-items:center; justify-content:center; font-size:2.8rem; position:relative; border-bottom:1px solid var(--border); overflow:hidden; }
    .card-thumb::after { content:''; position:absolute; inset:0; background:linear-gradient(160deg,rgba(255,255,255,.04) 0%,transparent 55%); pointer-events:none; }
    .card-play { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,.52); opacity:0; transition:opacity .18s; font-size:1.8rem; }
    .game-card:hover .card-play { opacity:1; }
    .card-accent { height:3px; background:var(--cc); transform:scaleX(0); transform-origin:left; transition:transform .2s; }
    .game-card:hover .card-accent { transform:scaleX(1); }
    .card-body { padding:12px 13px 13px; flex:1; display:flex; flex-direction:column; gap:5px; }
    .card-title { font-size:.875rem; font-weight:700; color:var(--t1); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .card-desc { font-size:.74rem; color:var(--t2); line-height:1.55; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; flex:1; }
    .card-footer { display:flex; align-items:center; justify-content:space-between; margin-top:8px; }
    .card-cat { font-size:.66rem; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:var(--cc); }
    .card-fav { background:none; border:none; cursor:pointer; font-size:.95rem; padding:2px; line-height:1; transition:transform .15s; }
    .card-fav:hover { transform:scale(1.25); }

    /* empty */
    .empty { text-align:center; padding:80px 24px; color:var(--t3); }
    .empty-icon { display:block; font-size:3rem; margin-bottom:14px; }
    .empty p { font-size:.9rem; line-height:1.7; }

    /* modal */
    .modal-overlay { position:fixed; inset:0; z-index:500; background:rgba(0,0,0,.82); backdrop-filter:blur(8px); display:flex; align-items:center; justify-content:center; padding:16px; opacity:0; pointer-events:none; transition:opacity .22s; }
    .modal-overlay.open { opacity:1; pointer-events:all; }
    .modal { background:var(--s1); border:1px solid var(--border-hi); border-radius:24px; width:100%; max-width:1120px; max-height:90vh; display:flex; flex-direction:column; overflow:hidden; transform:translateY(20px) scale(.97); transition:transform .22s; }
    .modal-overlay.open .modal { transform:none; }
    .modal-bar { display:flex; align-items:center; justify-content:space-between; padding:11px 16px; border-bottom:1px solid var(--border); gap:12px; flex-shrink:0; }
    .modal-info { display:flex; align-items:center; gap:10px; min-width:0; }
    .modal-badge { font-size:.64rem; font-weight:700; text-transform:uppercase; letter-spacing:.09em; padding:3px 9px; border-radius:999px; background:var(--s3); color:var(--bc,var(--accent)); flex-shrink:0; white-space:nowrap; }
    .modal-name { font-size:.875rem; font-weight:700; color:var(--t1); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .modal-actions { display:flex; align-items:center; gap:8px; flex-shrink:0; }
    .btn-tab { font-size:.78rem; font-weight:600; font-family:inherit; color:var(--t2); text-decoration:none; padding:6px 12px; border-radius:7px; background:var(--s2); border:1px solid var(--border); transition:color .15s,border-color .15s; white-space:nowrap; }
    .btn-tab:hover { color:var(--t1); border-color:var(--border-hi); }
    .btn-close { width:32px; height:32px; display:flex; align-items:center; justify-content:center; background:var(--s2); border:1px solid var(--border); border-radius:7px; color:var(--t2); font-size:.85rem; cursor:pointer; transition:background .15s,color .15s,border-color .15s; }
    .btn-close:hover { background:var(--accent); border-color:var(--accent); color:#fff; }
    .modal-body { flex:1; min-height:0; display:flex; flex-direction:column; }
    #gameFrame { width:100%; flex:1; min-height:520px; border:none; display:block; background:#000; }

    /* responsive */
    @media(max-width:768px){
      .fav-btn span{display:none} .fav-btn{padding:7px 10px}
      .hero{padding:48px 16px 40px} .browse-inner{padding:0 14px}
      .game-grid{grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px}
    }
    @media(max-width:480px){
      .logo{font-size:.9rem} .game-grid{grid-template-columns:repeat(2,1fr)}
      .modal{border-radius:18px;max-height:95vh} #gameFrame{min-height:380px}
    }
    @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
  </style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a class="logo" href="#">VOID<span>ARCADE</span></a>
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="searchInput" type="text" placeholder="Search games…" autocomplete="off" />
      <button class="search-clear" id="searchClear">✕</button>
    </div>
    <button class="fav-btn" id="favToggle" aria-pressed="false">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" width="15" height="15">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
      <span>Favourites</span>
      <span class="fav-count" id="favCount" hidden>0</span>
    </button>
  </div>
</header>

<main>
  <section class="hero">
    <div class="hero-grid"></div>
    <div class="hero-inner">
      <p class="hero-eyebrow">Free · No Login · No Downloads</p>
      <h1 class="hero-title">Play Any Game.<br>Anywhere.</h1>
      <p class="hero-sub">Instant browser games. No blocks. No excuses.</p>
    </div>
  </section>

  <section class="browse">
    <div class="browse-inner">
      <div class="filters" id="filters">
        <button class="pill active" data-cat="all">All</button>
      </div>
      <p class="stats" id="stats"></p>
      <div class="game-grid" id="gameGrid"></div>
      <div class="empty" id="emptyState" hidden>
        <span class="empty-icon">🕹️</span>
        <p>No games found. Try a different search.</p>
      </div>
    </div>
  </section>
</main>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-bar">
      <div class="modal-info">
        <span class="modal-badge" id="modalBadge"></span>
        <span class="modal-name" id="modalName"></span>
      </div>
      <div class="modal-actions">
        <a class="btn-tab" id="modalTab" target="_blank" rel="noopener">↗ Open in Tab</a>
        <button class="btn-close" id="modalClose">✕</button>
      </div>
    </div>
    <div class="modal-body">
      <iframe id="gameFrame"
        allowfullscreen
        allow="fullscreen; autoplay; gamepad"
        sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-pointer-lock allow-popups-to-escape-sandbox"
      ></iframe>
    </div>
  </div>
</div>

<script>
'use strict';

const COLORS = {
  arcade:'#FF6B35', puzzle:'#FFD166', classic:'#06D6A0',
  multiplayer:'#3FA7D6', shooter:'#EF476F', strategy:'#9B5DE5',
  sandbox:'#2EC4B6', idle:'#A8C5DA', racing:'#FFB703',
  sports:'#52B788', rpg:'#78C850', horror:'#C1121F'
};
const cc = cat => COLORS[cat.toLowerCase()] || '#FF4D6D';

const GAMES = [
  {id:1,  title:'Slope',                   cat:'Arcade',      e:'🏔️', url:'https://slope-game.com/',                        desc:'Speed down an infinite 3D slope and dodge obstacles.'},
  {id:2,  title:'Flappy Bird',              cat:'Arcade',      e:'🐦', url:'https://flappybird.io/',                          desc:'Tap to keep the bird flying through the gaps.'},
  {id:3,  title:'Run 3',                    cat:'Arcade',      e:'🏃', url:'https://run3.io/',                                desc:'Run through crumbling space tunnels — don\'t fall.'},
  {id:4,  title:'Geometry Dash',            cat:'Arcade',      e:'🔷', url:'https://geometrydash.io/',                        desc:'Jump and fly through rhythm-based obstacle courses.'},
  {id:5,  title:'2048',                     cat:'Puzzle',      e:'🟨', url:'https://2048game.com/',                           desc:'Slide tiles to combine numbers and reach 2048.'},
  {id:6,  title:'Sudoku',                   cat:'Puzzle',      e:'🔢', url:'https://sudoku.com/',                             desc:'Fill the 9×9 grid so every row and column has 1–9.'},
  {id:7,  title:'Wordle',                   cat:'Puzzle',      e:'🟩', url:'https://wordlegame.org/',                         desc:'Guess the 5-letter word in six tries.'},
  {id:8,  title:'Minesweeper',              cat:'Puzzle',      e:'💣', url:'https://minesweeper.online/',                     desc:'Clear the field without detonating any mines.'},
  {id:9,  title:'Pac-Man',                  cat:'Classic',     e:'👾', url:'https://freepacman.org/',                         desc:'Eat all the dots and evade the ghosts.'},
  {id:10, title:'Snake',                    cat:'Classic',     e:'🐍', url:'https://playsnake.org/',                          desc:'Guide the snake to eat food without hitting walls.'},
  {id:11, title:'Tetris',                   cat:'Classic',     e:'🧩', url:'https://tetris.com/play-tetris',                  desc:'Stack blocks to clear lines before they reach the top.'},
  {id:12, title:'Agar.io',                  cat:'Multiplayer', e:'🔵', url:'https://agar.io/',                                desc:'Grow your cell by eating smaller players.'},
  {id:13, title:'Slither.io',               cat:'Multiplayer', e:'💫', url:'https://slither.io/',                             desc:'Grow the longest snake by gobbling glowing orbs.'},
  {id:14, title:'Paper.io 2',               cat:'Multiplayer', e:'📄', url:'https://paper-io.com/',                           desc:'Capture territory without getting sliced.'},
  {id:15, title:'Wormate.io',               cat:'Multiplayer', e:'🍩', url:'https://wormate.io/',                             desc:'Eat sweets to grow your worm and dominate.'},
  {id:16, title:'Krunker.io',               cat:'Shooter',     e:'🎯', url:'https://krunker.io/',                             desc:'Fast-paced browser FPS — pick a class and frag.'},
  {id:17, title:'Shell Shockers',           cat:'Shooter',     e:'🥚', url:'https://shellshock.io/',                          desc:'Play as an armed egg in this multiplayer shooter.'},
  {id:18, title:'Chess',                    cat:'Strategy',    e:'♟️', url:'https://www.chess.com/play/computer',             desc:'Play chess against the computer.'},
  {id:19, title:'Bloons TD 5',              cat:'Strategy',    e:'🎈', url:'https://www.bloons.com/games/btd5/',              desc:'Pop balloons with monkeys before they reach the exit.'},
  {id:20, title:'Minecraft Classic',        cat:'Sandbox',     e:'⛏️', url:'https://classic.minecraft.net/',                  desc:'The original Minecraft, free in your browser.'},
  {id:21, title:'Cookie Clicker',           cat:'Idle',        e:'🍪', url:'https://orteil.dashnet.org/cookieclicker/',        desc:'Click the cookie. Bake billions.'},
  {id:22, title:'Moto X3M',                 cat:'Racing',      e:'🏍️', url:'https://moto-x3m.io/',                            desc:'Race through insane obstacle courses on a motorbike.'},
  {id:23, title:'Drift Hunters',            cat:'Racing',      e:'🚗', url:'https://www.drifthunters.com/',                   desc:'Tune your car and rack up drift combo points.'},
  {id:24, title:'Basketball Stars',         cat:'Sports',      e:'🏀', url:'https://www.basketballstars.io/',                 desc:'1v1 street basketball — shoot and block.'},
  {id:25, title:'Pokémon Emerald',          cat:'RPG',         e:'🌿', url:'https://www.play-games.com/iframe/26628.html',    desc:'Relive the GBA adventure through Hoenn.'},
  {id:26, title:"Five Nights at Freddy's",  cat:'Horror',      e:'🐻', url:'https://www.play-games.com/iframe/25093.html',    desc:'Survive five terrifying nights at Freddy Fazbear\'s Pizza.'},
  {id:27, title:'Mario Kart 64',            cat:'Racing',      e:'🏎️', url:'https://classicjoy.games/embed?slug=mario-kart-64', desc:'Race across iconic N64 tracks as your favourite Nintendo character.'},
  {id:28, title:'Veck.io',                  cat:'Multiplayer', e:'⬡',  url:'https://www.play-games.com/iframe/39726.html',    desc:'Competitive hexagon .io — claim territory and outmanoeuvre rivals.'},
];

// State
let activeCat = 'all', query = '', showFavs = false;
let favs = (() => { try { return JSON.parse(localStorage.getItem('va_f') || '[]'); } catch { return []; } })();

// DOM
const $grid    = document.getElementById('gameGrid');
const $filters = document.getElementById('filters');
const $search  = document.getElementById('searchInput');
const $clear   = document.getElementById('searchClear');
const $stats   = document.getElementById('stats');
const $empty   = document.getElementById('emptyState');
const $favBtn  = document.getElementById('favToggle');
const $favNum  = document.getElementById('favCount');
const $overlay = document.getElementById('modalOverlay');
const $badge   = document.getElementById('modalBadge');
const $name    = document.getElementById('modalName');
const $tab     = document.getElementById('modalTab');
const $close   = document.getElementById('modalClose');
const $frame   = document.getElementById('gameFrame');

// Build category pills
const seen = new Set();
GAMES.forEach(g => {
  if (seen.has(g.cat)) return;
  seen.add(g.cat);
  const b = document.createElement('button');
  b.className = 'pill'; b.dataset.cat = g.cat.toLowerCase(); b.textContent = g.cat;
  b.onclick = () => { activeCat = g.cat.toLowerCase(); $filters.querySelectorAll('.pill').forEach(p => p.classList.toggle('active', p.dataset.cat === activeCat)); render(); };
  $filters.appendChild(b);
});

function render() {
  let list = GAMES;
  if (showFavs) list = list.filter(g => favs.includes(g.id));
  if (activeCat !== 'all') list = list.filter(g => g.cat.toLowerCase() === activeCat);
  if (query) list = list.filter(g => (g.title + g.cat + g.desc).toLowerCase().includes(query));
  $stats.textContent = list.length + ' game' + (list.length !== 1 ? 's' : '');
  $empty.hidden = list.length > 0;
  $grid.innerHTML = '';
  list.forEach(g => {
    const color = cc(g.cat);
    const isFav = favs.includes(g.id);
    const el = document.createElement('article');
    el.className = 'game-card';
    el.tabIndex = 0;
    el.style.setProperty('--cc', color);
    el.innerHTML =
      '<div class="card-thumb" style="background:' + color + '18">' +
        '<span>' + g.e + '</span>' +
        '<div class="card-play">▶</div>' +
      '</div>' +
      '<div class="card-accent"></div>' +
      '<div class="card-body">' +
        '<div class="card-title">' + esc(g.title) + '</div>' +
        '<div class="card-desc">' + esc(g.desc) + '</div>' +
        '<div class="card-footer">' +
          '<span class="card-cat">' + esc(g.cat) + '</span>' +
          '<button class="card-fav" aria-label="favourite">' + (isFav ? '❤️' : '🤍') + '</button>' +
        '</div>' +
      '</div>';
    el.querySelector('.card-fav').addEventListener('click', ev => {
      ev.stopPropagation();
      favs = favs.includes(g.id) ? favs.filter(x => x !== g.id) : [...favs, g.id];
      localStorage.setItem('va_f', JSON.stringify(favs));
      $favNum.textContent = favs.length; $favNum.hidden = !favs.length;
      render();
    });
    el.addEventListener('click', () => open(g));
    el.addEventListener('keydown', ev => { if (ev.key === 'Enter') open(g); });
    $grid.appendChild(el);
  });
  $favNum.textContent = favs.length; $favNum.hidden = !favs.length;
}

function open(g) {
  const color = cc(g.cat);
  $badge.textContent = g.cat;
  $badge.style.setProperty('--bc', color);
  $name.textContent = g.title;
  $tab.href = g.url;
  $frame.src = g.url;
  $overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function close() {
  $overlay.classList.remove('open');
  document.body.style.overflow = '';
  setTimeout(() => { $frame.src = ''; }, 250);
}

$close.addEventListener('click', close);
$overlay.addEventListener('click', ev => { if (ev.target === $overlay) close(); });
document.addEventListener('keydown', ev => { if (ev.key === 'Escape') close(); });

$search.addEventListener('input', ev => {
  query = ev.target.value.trim().toLowerCase();
  $clear.classList.toggle('visible', query.length > 0);
  render();
});
$clear.addEventListener('click', () => { $search.value = ''; query = ''; $clear.classList.remove('visible'); render(); });

$favBtn.addEventListener('click', () => {
  showFavs = !showFavs;
  $favBtn.classList.toggle('active', showFavs);
  render();
});

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

render();
</script>
</body>
</html>
