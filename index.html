<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VoidArcade — Unblocked Games</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* === RESET === */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    /* === TOKENS === */
    :root {
      --bg:          #07070F;
      --surface-1:   #0E0E1C;
      --surface-2:   #161628;
      --surface-3:   #1E1E36;
      --border:      rgba(255,255,255,0.07);
      --border-hi:   rgba(255,255,255,0.14);
      --accent:      #FF4D6D;
      --text-1:      #EEEEFF;
      --text-2:      #8888AA;
      --text-3:      #44445A;
      --header-h:    62px;
      --radius:      12px;
      --radius-lg:   18px;
      --radius-xl:   24px;
    }

    /* === BASE === */
    body {
      background: var(--bg);
      color: var(--text-1);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Film grain */
    .noise {
      pointer-events: none;
      position: fixed;
      inset: 0;
      z-index: 900;
      opacity: 0.028;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px;
    }

    /* === HEADER === */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      height: var(--header-h);
      background: rgba(7,7,15,0.88);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
    }
    .header-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 24px;
      height: 100%;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.1rem;
      font-weight: 900;
      text-decoration: none;
      color: var(--text-1);
      letter-spacing: 0.06em;
      flex-shrink: 0;
      animation: logo-glitch 10s infinite;
    }
    .logo span { color: var(--accent); }
    @keyframes logo-glitch {
      0%,92%,100% { text-shadow: none; filter: none; }
      93%  { text-shadow: -2px 0 #9B5DE5, 2px 0 var(--accent); filter: hue-rotate(10deg); }
      94%  { text-shadow:  2px 0 #9B5DE5,-2px 0 var(--accent); }
      95%  { text-shadow: none; filter: none; }
      96%  { text-shadow: -1px 0 var(--accent); }
      97%  { text-shadow: none; }
    }

    .search-wrap {
      position: relative;
      flex: 1;
      max-width: 460px;
    }
    .search-icon {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      width: 15px;
      height: 15px;
      color: var(--text-3);
      pointer-events: none;
    }
    #searchInput {
      width: 100%;
      padding: 9px 34px 9px 36px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-1);
      font-size: 0.875rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.18s;
    }
    #searchInput:focus         { border-color: var(--accent); }
    #searchInput::placeholder  { color: var(--text-3); }
    .search-clear {
      position: absolute;
      right: 9px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-3);
      font-size: 0.7rem;
      cursor: pointer;
      padding: 4px;
      display: none;
      transition: color 0.15s;
    }
    .search-clear:hover  { color: var(--text-1); }
    .search-clear.visible { display: block; }

    .fav-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-2);
      font-size: 0.8rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      flex-shrink: 0;
      transition: border-color 0.18s, color 0.18s;
      white-space: nowrap;
    }
    .fav-btn:hover,
    .fav-btn.active { border-color: var(--accent); color: var(--accent); }
    .fav-btn.active svg { fill: var(--accent); stroke: var(--accent); }
    .fav-count {
      background: var(--accent);
      color: #fff;
      font-size: 0.65rem;
      font-weight: 700;
      min-width: 18px;
      height: 18px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
      margin-left: 2px;
    }

    /* === HERO === */
    .hero {
      position: relative;
      padding: 72px 24px 60px;
      text-align: center;
      overflow: hidden;
      border-bottom: 1px solid var(--border);
      background:
        radial-gradient(ellipse 70% 90% at 50% 110%, rgba(155,93,229,0.13) 0%, transparent 65%),
        radial-gradient(ellipse 40% 55% at 85% -10%,  rgba(255,77,109,0.09)  0%, transparent 70%);
    }
    .hero-grid {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      -webkit-mask-image: radial-gradient(ellipse 80% 80% at 50% 100%, black 0%, transparent 70%);
      mask-image: radial-gradient(ellipse 80% 80% at 50% 100%, black 0%, transparent 70%);
    }
    .hero-inner  { position: relative; z-index: 1; max-width: 600px; margin: 0 auto; }
    .hero-eyebrow {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 18px;
    }
    .hero-title {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2rem, 6vw, 3.8rem);
      font-weight: 900;
      line-height: 1.08;
      background: linear-gradient(160deg, #fff 0%, #AAAAC0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
    }
    .hero-sub { font-size: 1rem; color: var(--text-2); line-height: 1.65; }

    /* === BROWSE === */
    .browse { padding: 32px 0 96px; }
    .browse-inner { max-width: 1280px; margin: 0 auto; padding: 0 24px; }

    .filters { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
    .pill {
      padding: 6px 15px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text-2);
      font-size: 0.78rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.1s;
      text-transform: capitalize;
      line-height: 1;
    }
    .pill:hover  { border-color: var(--border-hi); color: var(--text-1); transform: translateY(-1px); }
    .pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    .stats { font-size: 0.78rem; color: var(--text-3); margin-bottom: 20px; font-weight: 500; }

    /* === CARD GRID === */
    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px;
    }

    .game-card {
      background: var(--surface-1);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      position: relative;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      --card-color: var(--accent);
    }
    .game-card:hover {
      transform: translateY(-5px);
      border-color: var(--card-color);
      box-shadow:
        0 12px 40px rgba(0,0,0,0.5),
        0 0 0 1px var(--card-color),
        0 0 24px -4px var(--card-color);
    }
    .game-card:focus-visible { outline: 2px solid var(--card-color); outline-offset: 2px; }

    .card-thumb {
      aspect-ratio: 16/9;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.8rem;
      position: relative;
      overflow: hidden;
      border-bottom: 1px solid var(--border);
      transition: background 0.2s;
    }
    .card-thumb::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(160deg, rgba(255,255,255,0.04) 0%, transparent 55%);
    }
    .card-play {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.55);
      opacity: 0;
      transition: opacity 0.18s;
      font-size: 1.8rem;
    }
    .game-card:hover .card-play { opacity: 1; }

    .card-accent {
      height: 3px;
      background: var(--card-color);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.2s ease;
    }
    .game-card:hover .card-accent { transform: scaleX(1); }

    .card-body {
      padding: 12px 13px 13px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .card-title {
      font-size: 0.875rem;
      font-weight: 700;
      color: var(--text-1);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-desc {
      font-size: 0.74rem;
      color: var(--text-2);
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      flex: 1;
    }
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
    }
    .card-cat {
      font-size: 0.66rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--card-color);
    }
    .card-fav-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-3);
      font-size: 0.95rem;
      padding: 2px;
      line-height: 1;
      transition: color 0.15s, transform 0.15s;
    }
    .card-fav-btn:hover { color: var(--accent); transform: scale(1.25); }
    .card-fav-btn.is-fav { color: var(--accent); }

    /* === EMPTY === */
    .empty { text-align: center; padding: 80px 24px; color: var(--text-3); }
    .empty-icon { display: block; font-size: 3rem; margin-bottom: 14px; }
    .empty p    { font-size: 0.9rem; line-height: 1.7; }

    /* === MODAL === */
    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 500;
      background: rgba(0,0,0,0.82);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--surface-1);
      border: 1px solid var(--border-hi);
      border-radius: var(--radius-xl);
      width: 100%;
      max-width: 1120px;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transform: translateY(20px) scale(0.97);
      transition: transform 0.22s ease;
    }
    .modal-overlay.open .modal { transform: translateY(0) scale(1); }

    .modal-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 16px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
      flex-shrink: 0;
    }
    .modal-info { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .modal-badge {
      font-size: 0.64rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      padding: 3px 9px;
      border-radius: 999px;
      background: var(--surface-3);
      color: var(--badge-color, var(--accent));
      flex-shrink: 0;
      white-space: nowrap;
    }
    .modal-title {
      font-size: 0.875rem;
      font-weight: 700;
      color: var(--text-1);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .modal-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .btn-tab {
      font-size: 0.78rem;
      font-weight: 600;
      font-family: inherit;
      color: var(--text-2);
      text-decoration: none;
      padding: 6px 12px;
      border-radius: 7px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      transition: color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    .btn-tab:hover { color: var(--text-1); border-color: var(--border-hi); }
    .btn-close {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text-2);
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .btn-close:hover { background: var(--accent); border-color: var(--accent); color: #fff; }

    .modal-frame-wrap { flex: 1; min-height: 0; position: relative; background: #000; }
    #gameFrame { width: 100%; height: 100%; min-height: 520px; border: none; display: block; }

    /* === RESPONSIVE === */
    @media (max-width: 768px) {
      .header-inner { gap: 10px; }
      .fav-btn span { display: none; }
      .fav-btn      { padding: 7px 10px; }
      .hero         { padding: 48px 16px 40px; }
      .browse-inner { padding: 0 14px; }
      .game-grid    { grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 10px; }
    }
    @media (max-width: 480px) {
      .logo         { font-size: 0.9rem; }
      .game-grid    { grid-template-columns: repeat(2, 1fr); }
      .modal        { border-radius: var(--radius-lg); max-height: 95vh; }
      #gameFrame    { min-height: 380px; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>

  <div class="noise" aria-hidden="true"></div>

  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <a class="logo" href="#">VOID<span>ARCADE</span></a>
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="searchInput" placeholder="Search games…" autocomplete="off" aria-label="Search games" />
        <button class="search-clear" id="searchClear" aria-label="Clear search">✕</button>
      </div>
      <button class="fav-btn" id="favToggle" aria-pressed="false">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" width="15" height="15" aria-hidden="true">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
        <span>Favourites</span>
        <span class="fav-count" id="favCount" hidden>0</span>
      </button>
    </div>
  </header>

  <!-- MAIN -->
  <main>
    <section class="hero">
      <div class="hero-grid" aria-hidden="true"></div>
      <div class="hero-inner">
        <p class="hero-eyebrow">Free · No Login · No Downloads</p>
        <h1 class="hero-title">Play Any Game.<br>Anywhere.</h1>
        <p class="hero-sub">Instant browser games. No blocks. No excuses.</p>
      </div>
    </section>

    <section class="browse" aria-label="Game library">
      <div class="browse-inner">
        <div class="filters" id="filters" role="group" aria-label="Filter by category">
          <button class="pill active" data-cat="all">All</button>
        </div>
        <p class="stats" id="stats" aria-live="polite"></p>
        <div class="game-grid" id="gameGrid" role="list"></div>
        <div class="empty" id="emptyState" hidden>
          <span class="empty-icon" aria-hidden="true">🕹️</span>
          <p>No games found.<br>Try a different search or category.</p>
        </div>
      </div>
    </section>
  </main>

  <!-- MODAL -->
  <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal" id="modal">
      <div class="modal-bar">
        <div class="modal-info">
          <span class="modal-badge" id="modalBadge"></span>
          <span class="modal-title" id="modalTitle"></span>
        </div>
        <div class="modal-actions">
          <a class="btn-tab" id="modalNewTab" target="_blank" rel="noopener noreferrer">↗ Open in Tab</a>
          <button class="btn-close" id="modalClose" aria-label="Close game">✕</button>
        </div>
      </div>
      <div class="modal-frame-wrap">
        <iframe id="gameFrame" allowfullscreen allow="fullscreen; gamepad"
          sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-pointer-lock"
          title="Game"></iframe>
      </div>
    </div>
  </div>

      { id:23, title:"Drift Hunters",    category:"Racing",      emoji:"🚗", url:"https://www.drifthunters.com/",            description:"Tune your car and rack up drift combo points around long circuits." },
      { id:24, title:"Basketball Stars", category:"Sports",      emoji:"🏀", url:"https://www.basketballstars.io/",          description:"1v1 street basketball — dribble, shoot, and block your opponent." }
    ];

    // ── CATEGORY COLOURS ────────────────────────────────────
    const CAT_COLORS = {
      arcade:      '#FF6B35',
      puzzle:      '#FFD166',
      classic:     '#06D6A0',
      multiplayer: '#3FA7D6',
      shooter:     '#EF476F',
      strategy:    '#9B5DE5',
      sandbox:     '#2EC4B6',
      idle:        '#A8C5DA',
      racing:      '#FFB703',
      sports:      '#52B788',
    };
    const catColor = cat => CAT_COLORS[cat.toLowerCase()] || '#FF4D6D';

    // ── STATE ────────────────────────────────────────────────
    let activeCategory = 'all';
    let searchQuery    = '';
    let showFavs       = false;
    let favourites     = (() => { try { return JSON.parse(localStorage.getItem('va_favs') || '[]'); } catch { return []; } })();

    // ── DOM ──────────────────────────────────────────────────
    const $grid        = document.getElementById('gameGrid');
    const $filters     = document.getElementById('filters');
    const $searchInput = document.getElementById('searchInput');
    const $searchClear = document.getElementById('searchClear');
    const $stats       = document.getElementById('stats');
    const $empty       = document.getElementById('emptyState');
    const $favToggle   = document.getElementById('favToggle');
    const $favCount    = document.getElementById('favCount');
    const $overlay     = document.getElementById('modalOverlay');
    const $modalTitle  = document.getElementById('modalTitle');
    const $modalBadge  = document.getElementById('modalBadge');
    const $modalNewTab = document.getElementById('modalNewTab');
    const $gameFrame   = document.getElementById('gameFrame');
    const $modalClose  = document.getElementById('modalClose');

    // ── INIT ─────────────────────────────────────────────────
    buildFilters();
    renderGrid();

    // ── FILTERS ──────────────────────────────────────────────
    function buildFilters() {
      const seen = new Set();
      const cats = [];
      GAMES.forEach(g => { const k = g.category.toLowerCase(); if (!seen.has(k)) { seen.add(k); cats.push(g.category); } });
      cats.sort().forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'pill';
        btn.dataset.cat = cat.toLowerCase();
        btn.textContent = cat;
        btn.addEventListener('click', () => setCategory(cat.toLowerCase()));
        $filters.appendChild(btn);
      });
    }

    function setCategory(cat) {
      activeCategory = cat;
      $filters.querySelectorAll('.pill').forEach(p => p.classList.toggle('active', p.dataset.cat === cat));
      renderGrid();
    }

    // ── SEARCH ───────────────────────────────────────────────
    $searchInput.addEventListener('input', e => {
      searchQuery = e.target.value.trim().toLowerCase();
      $searchClear.classList.toggle('visible', searchQuery.length > 0);
      renderGrid();
    });
    $searchClear.addEventListener('click', () => {
      $searchInput.value = ''; searchQuery = '';
      $searchClear.classList.remove('visible');
      $searchInput.focus(); renderGrid();
    });

    // ── FAVOURITES ───────────────────────────────────────────
    function saveFavs() { localStorage.setItem('va_favs', JSON.stringify(favourites)); }
    function updateFavCount() {
      const n = favourites.length;
      $favCount.textContent = n;
      $favCount.hidden = n === 0;
    }
    function toggleFav(id, e) {
      e.stopPropagation();
      favourites = favourites.includes(id) ? favourites.filter(f => f !== id) : [...favourites, id];
      saveFavs(); updateFavCount(); renderGrid();
    }
    $favToggle.addEventListener('click', () => {
      showFavs = !showFavs;
      $favToggle.classList.toggle('active', showFavs);
      $favToggle.setAttribute('aria-pressed', showFavs);
      renderGrid();
    });

    // ── RENDER ───────────────────────────────────────────────
    function renderGrid() {
      let list = GAMES;
      if (showFavs)              list = list.filter(g => favourites.includes(g.id));
      if (activeCategory !== 'all') list = list.filter(g => g.category.toLowerCase() === activeCategory);
      if (searchQuery)           list = list.filter(g =>
        g.title.toLowerCase().includes(searchQuery) ||
        g.description.toLowerCase().includes(searchQuery) ||
        g.category.toLowerCase().includes(searchQuery)
      );

      $stats.textContent = `${list.length} game${list.length !== 1 ? 's' : ''}`;
      $empty.hidden = list.length > 0;
      $grid.innerHTML = '';
      list.forEach(g => $grid.appendChild(makeCard(g)));
      updateFavCount();
    }

    function makeCard(game) {
      const color = catColor(game.category);
      const isFav = favourites.includes(game.id);
      const el    = document.createElement('article');
      el.className = 'game-card';
      el.setAttribute('role', 'listitem');
      el.setAttribute('tabindex', '0');
      el.style.setProperty('--card-color', color);
      el.innerHTML = `
        <div class="card-thumb" style="background:${color}1A;">
          <span aria-hidden="true">${game.emoji}</span>
          <div class="card-play" aria-hidden="true">▶</div>
        </div>
        <div class="card-accent"></div>
        <div class="card-body">
          <div class="card-title">${esc(game.title)}</div>
          <div class="card-desc">${esc(game.description)}</div>
          <div class="card-footer">
            <span class="card-cat">${esc(game.category)}</span>
            <button class="card-fav-btn ${isFav ? 'is-fav' : ''}"
              aria-label="${isFav ? 'Remove from favourites' : 'Add to favourites'}"
            >${isFav ? '❤️' : '🤍'}</button>
          </div>
        </div>`;
      el.querySelector('.card-fav-btn').addEventListener('click', e => toggleFav(game.id, e));
      el.addEventListener('click', () => openGame(game));
      el.addEventListener('keydown', e => { if (e.key === 'Enter') openGame(game); });
      return el;
    }

    // ── MODAL ────────────────────────────────────────────────
    function openGame(game) {
      const color = catColor(game.category);
      $modalTitle.textContent = game.title;
      $modalBadge.textContent = game.category;
      $modalBadge.style.setProperty('--badge-color', color);
      $modalNewTab.href = game.url;
      $gameFrame.src = game.url;
      $overlay.classList.add('open');
      document.body.style.overflow = 'hidden';
      setTimeout(() => $modalClose.focus(), 250);
    }

    function closeGame() {
      $overlay.classList.remove('open');
      document.body.style.overflow = '';
      setTimeout(() => { $gameFrame.src = ''; }, 220);
    }

    $modalClose.addEventListener('click', closeGame);
    $overlay.addEventListener('click', e => { if (e.target === $overlay) closeGame(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape' && $overlay.classList.contains('open')) closeGame(); });

    // ── UTIL ─────────────────────────────────────────────────
    function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  </script>
</body>
</html>
